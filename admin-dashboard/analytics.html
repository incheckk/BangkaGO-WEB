<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BangkaGo Admin — Analytics / ML Insights</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/admin-theme.css"/>
</head>
<body data-page="analytics">
  <div class="admin-shell">
    <div id="sidebarMount"></div>

    <main class="admin-main" id="adminMain">
      <div id="topbarMount"></div>

      <section class="admin-content container-fluid">
        <div class="row g-3 mb-3">
          <div class="col-md-4">
            <div class="kpi-card">
              <p>View Predictions</p>
              <h3>92.4%</h3>
              <span class="kpi-up">Accuracy</span>
            </div>
          </div>
          <div class="col-md-4">
            <div class="kpi-card">
              <p>View Model Info</p>
              <h3>v2.8</h3>
              <span>Stable</span>
            </div>
          </div>
          <div class="col-md-4">
            <div class="kpi-card">
              <p>Retrain Status</p>
              <h3>Idle</h3>
              <span class="kpi-warn">Manual trigger</span>
            </div>
          </div>
        </div>

        <div class="panel-card mb-3">
          <div class="panel-head"><h6 class="mb-0">View Insights</h6></div>
          <ul class="activity-list">
            <li><span>Peak booking window expected at 4:00 PM</span><small>Prediction</small></li>
            <li><span>Zone 2 likely delay risk +18%</span><small>Risk Insight</small></li>
            <li><span>Add 1 extra vessel on Port A route</span><small>Optimization</small></li>
          </ul>
        </div>

        <div class="panel-card">
          <div class="panel-head"><h6 class="mb-0">Model Actions</h6></div>
          <button class="btn btn-bangkago btn-sm">Trigger Model Retrain</button>
        </div>
      </section>
    </main>
  </div>

  <script src="assets/js/admin-theme.js"></script>
  <script src="assets/js/layout-loader.js"></script>
</body>
</html>
