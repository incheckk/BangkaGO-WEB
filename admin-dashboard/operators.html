<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BangkaGo Admin — Operators</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/admin-theme.css"/>
</head>
<body data-page="operators">
  <div class="admin-shell">
    <div id="sidebarMount"></div>

    <main class="admin-main" id="adminMain">
      <div id="topbarMount"></div>

      <section class="admin-content container-fluid">
        <div class="panel-card mb-3">
          <div class="panel-head">
            <h6 class="mb-0">View Pending Bangkeros</h6>
            <button class="btn btn-bangkago btn-sm">Bulk Approve</button>
          </div>

          <div class="table-responsive">
            <table class="table table-theme align-middle mb-0">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Documents</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Ramon Dela Cruz</td>
                  <td>License, ID, Boat Permit</td>
                  <td><span class="badge text-bg-warning">Pending</span></td>
                  <td class="d-flex gap-2">
                    <button class="btn btn-outline-bangkago btn-sm">Review Documents</button>
                    <button class="btn btn-bangkago btn-sm">Approve</button>
                    <button class="btn btn-outline-danger btn-sm">Reject</button>
                  </td>
                </tr>
                <tr>
                  <td>James Rivas</td>
                  <td>ID, NBI Clearance</td>
                  <td><span class="badge text-bg-warning">Pending</span></td>
                  <td class="d-flex gap-2">
                    <button class="btn btn-outline-bangkago btn-sm">Review Documents</button>
                    <button class="btn btn-bangkago btn-sm">Approve</button>
                    <button class="btn btn-outline-danger btn-sm">Reject</button>
                  </td>
                </tr>
                <tr>
                  <td>Aira De Mesa</td>
                  <td>License, Medical, Permit</td>
                  <td><span class="badge text-bg-success">Approved</span></td>
                  <td><button class="btn btn-outline-bangkago btn-sm">View</button></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="panel-card">
          <div class="panel-head">
            <h6 class="mb-0">Document Review Queue</h6>
          </div>
          <div class="route-pill-wrap justify-content-start">
            <span class="route-pill">Boat Permit Verification</span>
            <span class="route-pill">License Expiry Check</span>
            <span class="route-pill">Identity Validation</span>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="assets/js/admin-theme.js"></script>
  <script src="assets/js/layout-loader.js"></script>
</body>
</html>
