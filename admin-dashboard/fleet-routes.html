<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BangkaGo Admin — Fleet & Routes</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/admin-theme.css"/>
</head>
<body data-page="fleet-routes">
  <div class="admin-shell">
    <div id="sidebarMount"></div>

    <main class="admin-main" id="adminMain">
      <div id="topbarMount"></div>

      <section class="admin-content container-fluid">
        <div class="row g-3">
          <div class="col-xl-8">
            <div class="panel-card">
              <div class="panel-head">
                <h6 class="mb-0">View All Bangkas</h6>
                <button class="btn btn-bangkago btn-sm">Add Boat</button>
              </div>

              <div class="table-responsive">
                <table class="table table-theme align-middle mb-0">
                  <thead>
                    <tr>
                      <th>Boat ID</th>
                      <th>Name</th>
                      <th>Capacity</th>
                      <th>Status</th>
                      <th>Action</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td>B-001</td>
                      <td>Sea Runner</td>
                      <td>35</td>
                      <td><span class="badge text-bg-success">Active</span></td>
                      <td><button class="btn btn-outline-bangkago btn-sm">View</button></td>
                    </tr>
                    <tr>
                      <td>B-008</td>
                      <td>Island Queen</td>
                      <td>28</td>
                      <td><span class="badge text-bg-warning">Docked</span></td>
                      <td><button class="btn btn-outline-bangkago btn-sm">Edit</button></td>
                    </tr>
                    <tr>
                      <td>B-022</td>
                      <td>Blue Marlin</td>
                      <td>40</td>
                      <td><span class="badge text-bg-danger">Maintenance</span></td>
                      <td><button class="btn btn-outline-danger btn-sm">Deactivate Boat</button></td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>

          <div class="col-xl-4">
            <div class="panel-card mb-3">
              <div class="panel-head">
                <h6 class="mb-0">Add/Edit Route</h6>
              </div>
              <input class="form-control mb-2" placeholder="Route (e.g., Port A → Island D)">
              <button class="btn btn-outline-bangkago w-100">Save Route</button>
            </div>

            <div class="panel-card">
              <div class="panel-head">
                <h6 class="mb-0">Vessel History</h6>
              </div>
              <ul class="activity-list">
                <li><span>B-001 completed 8 trips</span><small>Today</small></li>
                <li><span>B-008 delayed due to weather</span><small>Yesterday</small></li>
                <li><span>B-022 moved to maintenance</span><small>2 days ago</small></li>
              </ul>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="assets/js/admin-theme.js"></script>
  <script src="assets/js/layout-loader.js"></script>
</body>
</html>
