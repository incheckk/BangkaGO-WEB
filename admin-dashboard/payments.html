<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BangkaGo Admin — Payments & Revenue</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/admin-theme.css"/>
</head>
<body data-page="payments">
  <div class="admin-shell">
    <div id="sidebarMount"></div>

    <main class="admin-main" id="adminMain">
      <div id="topbarMount"></div>

      <section class="admin-content container-fluid">
        <div class="row g-3 mb-3">
          <div class="col-md-4">
            <div class="kpi-card">
              <p>View Revenue</p>
              <h3>₱84,500</h3>
              <span class="kpi-up">+7.4%</span>
            </div>
          </div>
          <div class="col-md-4">
            <div class="kpi-card">
              <p>View Payment Records</p>
              <h3>231</h3>
              <span class="kpi-up">+18</span>
            </div>
          </div>
          <div class="col-md-4">
            <div class="kpi-card">
              <p>View Failed Payments</p>
              <h3>6</h3>
              <span class="kpi-down">Needs review</span>
            </div>
          </div>
        </div>

        <div class="panel-card">
          <div class="panel-head">
            <h6 class="mb-0">Payment Records</h6>
            <button class="btn btn-outline-bangkago btn-sm">Export</button>
          </div>

          <div class="table-responsive">
            <table class="table table-theme align-middle mb-0">
              <thead>
                <tr>
                  <th>Txn ID</th>
                  <th>User</th>
                  <th>Amount</th>
                  <th>Method</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>TX-9011</td>
                  <td>Maria Santos</td>
                  <td>₱1,250</td>
                  <td>GCash</td>
                  <td><span class="badge text-bg-success">Paid</span></td>
                </tr>
                <tr>
                  <td>TX-9012</td>
                  <td>John Cruz</td>
                  <td>₱980</td>
                  <td>Card</td>
                  <td><span class="badge text-bg-danger">Failed</span></td>
                </tr>
                <tr>
                  <td>TX-9013</td>
                  <td>Ana Reyes</td>
                  <td>₱1,450</td>
                  <td>Cash</td>
                  <td><span class="badge text-bg-success">Paid</span></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="assets/js/admin-theme.js"></script>
  <script src="assets/js/layout-loader.js"></script>
</body>
</html>
