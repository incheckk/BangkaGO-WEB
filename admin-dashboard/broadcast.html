<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BangkaGo Admin — Broadcast</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/admin-theme.css"/>
</head>
<body data-page="broadcast">
  <div class="admin-shell">
    <div id="sidebarMount"></div>

    <main class="admin-main" id="adminMain">
      <div id="topbarMount"></div>

      <section class="admin-content container-fluid">
        <div class="panel-card">
          <div class="panel-head">
            <h6 class="mb-0">Broadcast Message</h6>
          </div>

          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label">Audience</label>
              <select class="form-select">
                <option>All Users</option>
                <option>Operators</option>
                <option>Passengers</option>
                <option>Admins</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label">Priority</label>
              <select class="form-select">
                <option>Normal</option>
                <option>High</option>
                <option>Emergency</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label">Channel</label>
              <select class="form-select">
                <option>In-App</option>
                <option>SMS</option>
                <option>Email</option>
              </select>
            </div>

            <div class="col-12">
              <label class="form-label">Message</label>
              <textarea class="form-control" rows="5" placeholder="Type your message..."></textarea>
            </div>

            <div class="col-12 d-flex gap-2">
              <button class="btn btn-bangkago">
                <i class="bi bi-send-fill me-1"></i> Send Broadcast
              </button>
              <button class="btn btn-outline-bangkago">Save Draft</button>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="assets/js/admin-theme.js"></script>
  <script src="assets/js/layout-loader.js"></script>
</body>
</html>
