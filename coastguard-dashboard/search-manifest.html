<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BangkaGo Coast Guard — Search Manifest</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/coastguard-theme.css"/>
</head>
<body data-page="search-manifest">
  <div class="cg-shell">
    <div id="sidebarMount"></div>
    <main class="cg-main" id="cgMain">
      <div id="topbarMount"></div>

      <section class="cg-content container-fluid">
        <div class="row g-3">
          <div class="col-12">
            <div class="cg-card">
              <div class="panel-head">
                <h6 class="mb-0">Search Manifest (Read-Only)</h6>
                <span class="readonly-pill"><i class="bi bi-eye-fill"></i> View Only</span>
              </div>

              <!-- Search controls -->
              <div class="row g-2 mb-3">
                <div class="col-md-5">
                  <input id="manifestSearchInput" class="form-control" type="text" placeholder="Search by Manifest ID, vessel, route, or date">
                </div>
                <div class="col-md-3">
                  <select id="manifestRouteFilter" class="form-select">
                    <option value="">All Routes</option>
                    <option value="Port A → Island C">Port A → Island C</option>
                    <option value="Port B → Island A">Port B → Island A</option>
                    <option value="Port D → Island B">Port D → Island B</option>
                    <option value="Port C → Island A">Port C → Island A</option>
                  </select>
                </div>
                <div class="col-md-4 d-flex gap-2">
                  <button id="manifestSearchBtn" class="btn btn-primary w-100" type="button">
                    <i class="bi bi-search me-1"></i> Search
                  </button>
                  <button id="manifestResetBtn" class="btn btn-outline-secondary w-100" type="button">
                    Reset
                  </button>
                </div>
              </div>

              <div id="manifestResultCount" class="small text-secondary mb-2"></div>

              <!-- Results table -->
              <div class="table-responsive">
                <table class="table table-theme align-middle mb-0">
                  <thead>
                    <tr>
                      <th>Manifest ID</th>
                      <th>Vessel</th>
                      <th>Route</th>
                      <th>Passengers</th>
                      <th>Cargo</th>
                      <th>Departure</th>
                      <th>Date</th>
                    </tr>
                  </thead>
                  <tbody id="manifestTableBody"></tbody>
                </table>
              </div>

              <p id="manifestEmptyState" class="text-center text-secondary my-3 d-none">
                No manifests found for your search.
              </p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="assets/js/coastguard-theme.js"></script>
  <script src="assets/js/layout-loader.js"></script>
  <script>
    const manifests = [
      { id: "MF-190", vessel: "Boat 08", route: "Marigondon Port -> Olanggo", passengers: 46, cargo: "12 crates", departure: "13:20", date: "2026-04-09" },
      { id: "MF-188", vessel: "Boat 03", route: "Olanggo Port -> Marigondon", passengers: 31, cargo: "8 sacks", departure: "13:05", date: "2026-04-09" },
      { id: "MF-184", vessel: "Boat 11", route: "Mactan Port -> Caohagan", passengers: 27, cargo: "5 boxes", departure: "12:42", date: "2026-04-08" },
      { id: "MF-179", vessel: "Boat 15", route: "Engano Port -> Caihagan", passengers: 39, cargo: "10 drums", departure: "11:58", date: "2026-04-08" }
    ];

    const input = document.getElementById("manifestSearchInput");
    const routeFilter = document.getElementById("manifestRouteFilter");
    const searchBtn = document.getElementById("manifestSearchBtn");
    const resetBtn = document.getElementById("manifestResetBtn");
    const tbody = document.getElementById("manifestTableBody");
    const resultCount = document.getElementById("manifestResultCount");
    const emptyState = document.getElementById("manifestEmptyState");

    function renderRows(data){
      tbody.innerHTML = "";

      if(data.length === 0){
        emptyState.classList.remove("d-none");
      } else {
        emptyState.classList.add("d-none");
      }

      data.forEach(m => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${m.id}</td>
          <td>${m.vessel}</td>
          <td>${m.route}</td>
          <td>${m.passengers}</td>
          <td>${m.cargo}</td>
          <td>${m.departure}</td>
          <td>${m.date}</td>
        `;
        tbody.appendChild(tr);
      });

      resultCount.textContent = `Showing ${data.length} manifest(s)`;
    }

    function runSearch(){
      const q = input.value.trim().toLowerCase();
      const route = routeFilter.value;

      const filtered = manifests.filter(m => {
        const textMatch =
          m.id.toLowerCase().includes(q) ||
          m.vessel.toLowerCase().includes(q) ||
          m.route.toLowerCase().includes(q) ||
          m.date.toLowerCase().includes(q);

        const routeMatch = route ? m.route === route : true;
        return textMatch && routeMatch;
      });

      renderRows(filtered);
    }

    searchBtn.addEventListener("click", runSearch);
    resetBtn.addEventListener("click", () => {
      input.value = "";
      routeFilter.value = "";
      renderRows(manifests);
    });
    input.addEventListener("keydown", (e) => {
      if(e.key === "Enter") runSearch();
    });

    renderRows(manifests);
  </script>
</body>
</html>
