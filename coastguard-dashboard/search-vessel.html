<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BangkaGo Coast Guard — Search Vessel</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/coastguard-theme.css"/>
</head>
<body data-page="search-vessel">
  <div class="cg-shell">
    <div id="sidebarMount"></div>

    <main class="cg-main" id="cgMain">
      <div id="topbarMount"></div>

      <section class="cg-content container-fluid">
        <div class="row g-3">
          <div class="col-12">
            <div class="cg-card">
              <div class="panel-head">
                <h6 class="mb-0">Search Vessel (Read-Only)</h6>
                <span class="readonly-pill"><i class="bi bi-eye-fill"></i> View Only</span>
              </div>

              <!-- Search controls -->
              <div class="row g-2 mb-3">
                <div class="col-md-5">
                  <input id="searchInput" class="form-control" type="text" placeholder="Search by Vessel ID, name, operator, or route">
                </div>
                <div class="col-md-3">
                  <select id="statusFilter" class="form-select">
                    <option value="">All Status</option>
                    <option value="On Track">On Track</option>
                    <option value="Delayed">Delayed</option>
                    <option value="Docking">Docking</option>
                  </select>
                </div>
                <div class="col-md-4 d-flex gap-2">
                  <button id="searchBtn" class="btn btn-primary w-100" type="button">
                    <i class="bi bi-search me-1"></i> Search
                  </button>
                  <button id="resetBtn" class="btn btn-outline-secondary w-100" type="button">
                    Reset
                  </button>
                </div>
              </div>

              <div id="resultCount" class="small text-secondary mb-2"></div>

              <!-- Results table -->
              <div class="table-responsive">
                <table class="table table-theme align-middle mb-0">
                  <thead>
                    <tr>
                      <th>Vessel ID</th>
                      <th>Name</th>
                      <th>Operator</th>
                      <th>Current Route</th>
                      <th>Last Ping</th>
                      <th>Status</th>
                    </tr>
                  </thead>
                  <tbody id="vesselTableBody"></tbody>
                </table>
              </div>

              <p id="emptyState" class="text-center text-secondary my-3 d-none">
                No vessels found for your search.
              </p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="assets/js/coastguard-theme.js"></script>
  <script src="assets/js/layout-loader.js"></script>
  <script>
    // Demo vessel data (frontend-only)
    const vessels = [
      { id: "VSL-008", name: "Boat 08", operator: "OP-21", route: "Marigondon Port -> Olanggo", ping: "14:43", status: "On Track" },
      { id: "VSL-003", name: "Boat 03", operator: "OP-09", route: "Engano Port -> Caihagan", ping: "14:39", status: "Delayed" },
      { id: "VSL-011", name: "Boat 11", operator: "OP-14", route: "Marigondon Port -> Olanggo", ping: "14:37", status: "Docking" },
      { id: "VSL-006", name: "Boat 06", operator: "OP-18", route: "Olanggo Port -> Marigondon", ping: "14:35", status: "On Track" },
      { id: "VSL-015", name: "Boat 15", operator: "OP-04", route: "Mactan Port -> Caohagan", ping: "14:31", status: "Delayed" }
    ];

    const tbody = document.getElementById("vesselTableBody");
    const searchInput = document.getElementById("searchInput");
    const statusFilter = document.getElementById("statusFilter");
    const searchBtn = document.getElementById("searchBtn");
    const resetBtn = document.getElementById("resetBtn");
    const resultCount = document.getElementById("resultCount");
    const emptyState = document.getElementById("emptyState");

    function badgeClass(status){
      if(status === "On Track") return "text-bg-success";
      if(status === "Delayed") return "text-bg-warning";
      return "text-bg-info";
    }

    function renderRows(data){
      tbody.innerHTML = "";
      if(data.length === 0){
        emptyState.classList.remove("d-none");
      } else {
        emptyState.classList.add("d-none");
      }

      data.forEach(v => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${v.id}</td>
          <td>${v.name}</td>
          <td>${v.operator}</td>
          <td>${v.route}</td>
          <td>${v.ping}</td>
          <td><span class="badge ${badgeClass(v.status)}">${v.status}</span></td>
        `;
        tbody.appendChild(tr);
      });

      resultCount.textContent = `Showing ${data.length} vessel(s)`;
    }

    function runSearch(){
      const q = searchInput.value.trim().toLowerCase();
      const status = statusFilter.value;

      const filtered = vessels.filter(v => {
        const textMatch =
          v.id.toLowerCase().includes(q) ||
          v.name.toLowerCase().includes(q) ||
          v.operator.toLowerCase().includes(q) ||
          v.route.toLowerCase().includes(q);

        const statusMatch = status ? v.status === status : true;
        return textMatch && statusMatch;
      });

      renderRows(filtered);
    }

    searchBtn.addEventListener("click", runSearch);
    resetBtn.addEventListener("click", () => {
      searchInput.value = "";
      statusFilter.value = "";
      renderRows(vessels);
    });
    searchInput.addEventListener("keydown", (e) => {
      if(e.key === "Enter") runSearch();
    });

    renderRows(vessels);
  </script>
</body>
</html>
