<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BangkaGo Coast Guard — Port History</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/coastguard-theme.css"/>
</head>
<body data-page="port-history">
  <div class="cg-shell">
    <div id="sidebarMount"></div>
    <main class="cg-main" id="cgMain">
      <div id="topbarMount"></div>

      <section class="cg-content container-fluid">
        <div class="row g-3">
          <div class="col-12">
            <div class="cg-card">
              <div class="panel-head">
                <h6 class="mb-0">Port Arrival / Departure History</h6>
                <span class="readonly-pill"><i class="bi bi-eye-fill"></i> Read Only</span>
              </div>

              <div class="table-responsive">
                <table class="table table-theme align-middle mb-0">
                  <thead>
                    <tr>
                      <th>Date</th>
                      <th>Vessel</th>
                      <th>Port</th>
                      <th>Event</th>
                      <th>Time</th>
                      <th>Condition</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td>2026-04-09</td>
                      <td>Boat 08</td>
                      <td>Marigondon Port</td>
                      <td><span class="badge text-bg-primary">Departure</span></td>
                      <td>13:20</td>
                      <td>Clear</td>
                    </tr>
                    <tr>
                      <td>2026-04-09</td>
                      <td>Boat 11</td>
                      <td>Mactan Port</td>
                      <td><span class="badge text-bg-success">Arrival</span></td>
                      <td>13:58</td>
                      <td>Moderate</td>
                    </tr>
                    <tr>
                      <td>2026-04-08</td>
                      <td>Boat 03</td>
                      <td>Olanggo Port</td>
                      <td><span class="badge text-bg-primary">Departure</span></td>
                      <td>16:12</td>
                      <td>Rain</td>
                    </tr>
                    <tr>
                      <td>2026-04-08</td>
                      <td>Boat 06</td>
                      <td>Olanggo Port</td>
                      <td><span class="badge text-bg-success">Arrival</span></td>
                      <td>17:01</td>
                      <td>Clear</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="assets/js/coastguard-theme.js"></script>
  <script src="assets/js/layout-loader.js"></script>
</body>
</html>
